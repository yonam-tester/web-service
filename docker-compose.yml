version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: yeonam-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
